name: Build & Release APK

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      track:
        description: 'Play Store track (internal, alpha, beta, production)'
        required: true
        default: 'internal'
        type: choice
        options:
          - internal
          - alpha
          - beta
          - production

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Get Flutter dependencies
        run: flutter pub get

      - name: Create key.properties
        run: |
          echo "${{ secrets.KEYSTORE_PROPERTIES }}" | base64 -d > android/key.properties

      - name: Create signing keystore
        run: |
          echo "${{ secrets.SIGNING_KEYSTORE }}" | base64 -d > android/app/key.jks

      - name: Build APK
        run: flutter build apk --flavor production -t lib/main_production.dart --release

      - name: Build AAB for Play Store
        run: flutter build appbundle --flavor production -t lib/main_production.dart --release

      - name: Set up Ruby for fastlane
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.0'
          bundler-cache: true
          working-directory: android

      - name: Create Play Store credentials
        run: |
          echo "${{ secrets.PLAY_STORE_SERVICE_ACCOUNT }}" > android/play-store-key.json

      - name: Deploy to Play Store
        working-directory: android
        run: |
          gem install fastlane
          fastlane run upload_to_play_store \
            aab:../build/app/outputs/bundle/productionRelease/app-production-release.aab \
            json_key:play-store-key.json \
            package_name:in.appkari.notihub \
            track:${{ github.event.inputs.track || 'internal' }} \
            skip_upload_screenshots:true \
            skip_upload_images:true

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: build/app/outputs/flutter-apk/app-production-release.apk
          body: |
            Automatic release build for ${{ github.ref_name }}

            **Deployment:**
            - APK: Available in assets below
            - Play Store: Uploaded to track `${{ github.event.inputs.track || 'internal' }}`

            **How to use:**
            1. Download the APK or wait for Play Store approval
            2. For code updates, use: `shorebird release android`
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload APK to artifacts
        uses: actions/upload-artifact@v3
        with:
          name: notification-hub-apk
          path: build/app/outputs/flutter-apk/app-production-release.apk
