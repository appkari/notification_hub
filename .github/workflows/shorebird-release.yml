name: Shorebird Patch (Prod)

# Run manually from the Actions tab whenever you have a Dart-only fix to ship
# OTA without a Play Store review.  The version in pubspec.yaml must match an
# existing Shorebird release (created by the Release (Prod) workflow).

on:
  workflow_dispatch:

jobs:
  patch:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Install dependencies
        run: flutter pub get

      - uses: shorebirdtech/setup-shorebird@v1

      - name: Shorebird patch
        run: |
          VERSION=$(grep '^version:' pubspec.yaml | awk '{print $2}')
          echo "Patching release $VERSION …"
          shorebird patch android --flavor production --release-version="$VERSION"
        env:
          SHOREBIRD_TOKEN: ${{ secrets.SHOREBIRD_TOKEN }}
