name: Release (Prod)

on:
  push:
    tags:
      - 'prod@*'

jobs:
  release:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze & test
        run: |
          flutter analyze
          flutter test

      - name: Set up signing
        run: |
          echo "${{ secrets.KEYSTORE_PROPERTIES }}" | base64 -d > android/key.properties
          echo "${{ secrets.SIGNING_KEYSTORE }}"    | base64 -d > android/app/key.jks

      - uses: shorebirdtech/setup-shorebird@v1

      # Builds the Shorebird-instrumented AAB and registers it as the baseline.
      # This is the only build step — we upload the output of THIS command to
      # the Play Store so users are on the instrumented build and can receive
      # future OTA patches without a review cycle.
      - name: Shorebird release
        run: shorebird release android --flavor production
        env:
          SHOREBIRD_TOKEN: ${{ secrets.SHOREBIRD_TOKEN }}

      - name: Decode Play Store service account
        run: echo "${{ secrets.PLAY_STORE_SERVICE_ACCOUNT }}" | base64 -d > /tmp/play-store-key.json

      - name: Upload to Play Store (internal track)
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJson: /tmp/play-store-key.json
          packageName: in.appkari.notihub
          releaseFiles: build/app/outputs/bundle/productionRelease/app-production-release.aab
          track: internal
          status: completed
